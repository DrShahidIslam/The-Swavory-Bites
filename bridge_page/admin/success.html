<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | The Swavory Bites Automation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background-color: #e60023;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">✓</div>
        <h1>Connection Successful!</h1>
        <p>Your Pinterest account has been successfully linked to The Swavory Bites Automation.</p>
        <a href="dashboard.html?connected=true" class="btn">Return to Dashboard</a>
    </div>
</body>
</html>
