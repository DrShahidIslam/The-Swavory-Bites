<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Swavory Bites Automation</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fef2f2 0%, #f0f2f5 100%);
        }
        .login-card {
            width: 400px;
            padding: 48px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 24px;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-login {
            width: 100%;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">F</div>
        <h2>Welcome Back</h2>
        <p>Login to your automation dashboard</p>
        
        <form action="dashboard.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="admin@foodtrends.com" readonly>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" value="••••••••" readonly>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Sign In</button>
        </form>
    </div>
</body>
</html>
