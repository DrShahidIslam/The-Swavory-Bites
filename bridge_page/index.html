<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">THE SWAVORY BITES - Discover Premium Recipes</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="Discover premium viral recipes, curated directly from our The Swavory Bites database.">
    <meta name="robots" content="noindex, follow">

    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8f1f28;
            --accent: #d87439;
            --bg: #fffaf5;
            --text: #2a1910;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        /* Dynamic Blurred Background */
        .blur-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.85);
            opacity: 0.15;
            z-index: -1;
            transition: background-image 1s ease, opacity 1s ease;
        }

        /* Branding Header */
        header {
            text-align: center;
            margin-top: 20px;
            animation: fadeInDown 0.8s ease-out;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .tagline {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 5px;
        }

        /* Glassmorphic Container */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(143, 31, 40, 0.12);
            border-radius: 32px;
            max-width: 520px;
            width: 100%;
            padding: 40px;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
            position: relative;
            animation: fadeInUp 0.8s ease-out;
        }

        .recipe-thumb {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            background: #eee;
            display: none; /* hidden until loaded */
        }

        .trend-badge {
            display: inline-block;
            background: #fff0f0;
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            line-height: 1.2;
            margin: 0 0 15px 0;
            color: var(--text);
        }

        .excerpt {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #554a44;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            background: linear-gradient(135deg, var(--primary) 0%, #b32a35 100%);
            color: white;
            padding: 20px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(143, 31, 40, 0.4);
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(143, 31, 40, 0.5);
            background: linear-gradient(135deg, var(--accent) 0%, #e68a4d 100%);
        }

        /* Lead Capture Section */
        .email-capture {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .email-capture h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin: 0 0 5px 0;
            color: var(--text);
        }

        .email-capture p {
            font-size: 0.9rem;
            color: #777;
            margin: 0 0 15px 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex-grow: 1;
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid #ddd;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .input-group button {
            background: var(--text);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-group button:hover {
            background: var(--accent);
        }

        /* Loader Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="backdrop" class="blur-bg"></div>

    <header>
        <h1>THE SWAVORY BITES</h1>
        <div class="tagline">Discovery Portal</div>
    </header>

    <div class="glass-card">
        <!-- Loader Skeleton -->
        <div id="loader">
            <div class="skeleton" style="width: 100%; height: 260px; border-radius: 20px; margin-bottom: 25px;"></div>
            <div class="skeleton" style="width: 40%; height: 24px; border-radius: 50px; margin: 0 auto 15px auto;"></div>
            <div class="skeleton" style="width: 90%; height: 40px; margin: 0 auto 15px auto;"></div>
            <div class="skeleton" style="width: 100%; height: 80px; margin: 0 auto 30px auto;"></div>
            <div class="skeleton" style="width: 100%; height: 60px; border-radius: 100px;"></div>
        </div>

        <!-- Dynamic Content (Hidden Initially) -->
        <div id="post-content" style="display: none;">
            <img id="recipe-img" class="recipe-thumb" src="" alt="Recipe Preview">
            <div class="trend-badge">VERIFIED MATCH</div>
            <h2 id="recipe-title">Loading...</h2>
            <div id="recipe-excerpt" class="excerpt"></div>
            
            <a href="https://el-mordjene.info" id="recipe-btn" class="btn">VIEW FULL RECIPE</a>

            <!-- Soft Email Lead Capture -->
            <div class="email-capture">
                <h4>Get Viral Recipes Weekly</h4>
                <p>Join 15,000+ food lovers and get free PDF recipe books!</p>
                <form class="input-group" onsubmit="event.preventDefault(); alert('Subscribed! Check your inbox soon.');">
                    <input type="email" placeholder="Your best email..." required>
                    <button type="submit">Subscribe</button>
                </form>
            </div>

            <!-- Related Recipes -->
            <div id="related-recipes" style="margin-top: 40px; text-align: left; display: none;">
                <h3 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text); border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-bottom: 20px;">You Might Also Like</h3>
                <div id="related-list" style="display: flex; flex-direction: column; gap: 15px;"></div>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px; padding-bottom: 20px;">
        <div style="margin-bottom: 10px;">
            <a href="../privacy.html" style="color: #aaa; font-size: 0.85rem; text-decoration: none; margin: 0 10px;">Privacy Policy</a>
            <a href="../terms.html" style="color: #aaa; font-size: 0.85rem; text-decoration: none; margin: 0 10px;">Terms of Service</a>
            <a href="../contact.html" style="color: #aaa; font-size: 0.85rem; text-decoration: none; margin: 0 10px;">Contact Us</a>
        </div>
        <div style="color: #aaa; font-size: 0.8rem; letter-spacing: 1px;">
            &copy; 2026 THE SWAVORY BITES. ALL RIGHTS RESERVED.
        </div>
    </div>

    <script>
        async function fetchRecipe() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            const loader = document.getElementById('loader');
            const content = document.getElementById('post-content');
            
            // Fallback immediately if no ID is passed
            if(!id) {
                document.getElementById('recipe-title').innerText = "Explore Premium The Swavory Bites";
                document.getElementById('recipe-excerpt').innerText = "Discover our latest curated collection of viral recipes and culinary inspirations.";
                loader.style.display = 'none';
                content.style.display = 'block';
                return;
            }

            try {
                // Fetch directly from WordPress API
                const res = await fetch(`https://el-mordjene.info/wp-json/wp/v2/posts?slug=${id}`);
                
                if(res.ok) {
                    const posts = await res.json();
                    if(posts.length > 0) {
                        const post = posts[0];
                        
                        // Populate Text & Link
                        document.getElementById('recipe-title').innerHTML = post.title.rendered;
                        document.getElementById('meta-title').innerText = post.title.rendered + " - THE SWAVORY BITES";
                        
                        // Clean up excerpt (remove HTML tags)
                        let rawExcerpt = post.excerpt.rendered.replace(/<\/?[^>]+(>|$)/g, "");
                        document.getElementById('recipe-excerpt').innerText = rawExcerpt;
                        
                        document.getElementById('recipe-btn').href = post.link;

                        // Fetch Featured Image
                        if(post.featured_media) {
                            try {
                                const imgRes = await fetch(`https://el-mordjene.info/wp-json/wp/v2/media/${post.featured_media}`);
                                if(imgRes.ok) {
                                    const imgData = await imgRes.json();
                                    const imgUrl = imgData.source_url;
                                    
                                    const imgEl = document.getElementById('recipe-img');
                                    imgEl.src = imgUrl;
                                    imgEl.style.display = 'block';
                                    
                                    const backdrop = document.getElementById('backdrop');
                                    backdrop.style.backgroundImage = `url('${imgUrl}')`;
                                    backdrop.style.opacity = '0.3';
                                }
                            } catch(e) { console.error("Image fetch failed", e); }
                        }

                        // Fetch Related Recipes
                        fetchRelatedRecipes();

                        // Reveal Content
                        loader.style.display = 'none';
                        content.style.display = 'block';
                        return;
                    }
                }
            } catch(e) {
                console.error("Failed to dynamically fetch recipe details", e);
            }

            // Error Fallback
            document.getElementById('recipe-title').innerText = "Recipe Found!";
            document.getElementById('recipe-excerpt').innerText = "Click below to view the full details and instructions on our main site.";
            document.getElementById('recipe-btn').href = "https://el-mordjene.info";
            loader.style.display = 'none';
            content.style.display = 'block';
        }

        async function fetchRelatedRecipes() {
            try {
                const res = await fetch(`https://el-mordjene.info/wp-json/wp/v2/posts?per_page=3&_embed`);
                if(res.ok) {
                    const posts = await res.json();
                    const listEl = document.getElementById('related-list');
                    let html = '';
                    for(const p of posts) {
                        const imgUrl = p._embedded?.['wp:featuredmedia']?.[0]?.media_details?.sizes?.thumbnail?.source_url || p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
                        const imgHtml = imgUrl ? `<img src="${imgUrl}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px;">` : '';
                        
                        html += `
                            <a href="?id=${p.slug}" style="display: flex; gap: 15px; text-decoration: none; color: inherit; align-items: center; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 12px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                                ${imgHtml}
                                <div style="flex-grow: 1;">
                                    <h4 style="margin: 0 0 5px 0; font-family: 'Outfit', sans-serif; font-size: 1.05rem; line-height: 1.2;">${p.title.rendered}</h4>
                                    <span style="font-size: 0.8rem; color: var(--primary); font-weight: bold;">VIEW RECIPE ➔</span>
                                </div>
                            </a>
                        `;
                    }
                    if(html) {
                        listEl.innerHTML = html;
                        document.getElementById('related-recipes').style.display = 'block';
                    }
                }
            } catch(e) { console.error("Failed to fetch related", e); }
        }

        // Initialize immediately
        window.onload = fetchRecipe;
    </script>
</body>
</html>
